name: Generate Images
run-name: Generate ${{ inputs.model }} [${{ inputs.request_id || github.run_id }}]

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to use"
        required: true
        type: choice
        options:
          - reve
          - seedream
          - nano-banana2
          - clarity-upscaler
          - illustrious
      prompt:
        description: "Text prompt"
        required: false
        type: string
      image_url:
        description: "Input image URL (optional)"
        required: false
        type: string
      card_state_b64:
        description: "Base64-encoded card snapshot from the web UI"
        required: false
        type: string
      request_id:
        description: "Client-generated request id for artifact retrieval"
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run generation
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_PROMPT: ${{ inputs.prompt }}
          INPUT_IMAGE_URL: ${{ inputs.image_url }}
          INPUT_CARD_STATE_B64: ${{ inputs.card_state_b64 }}
          INPUT_REQUEST_ID: ${{ inputs.request_id }}
        run: |
          if [ -n "$INPUT_CARD_STATE_B64" ]; then
            uv run fal-studio run "$INPUT_MODEL" --card-state-b64 "$INPUT_CARD_STATE_B64"
          elif [ -n "$INPUT_IMAGE_URL" ]; then
            uv run fal-studio run "$INPUT_MODEL" -p "$INPUT_PROMPT" -i "$INPUT_IMAGE_URL"
          else
            uv run fal-studio run "$INPUT_MODEL" -p "$INPUT_PROMPT"
          fi

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: fal-result-${{ inputs.request_id || github.run_id }}
          path: outputs/*.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
