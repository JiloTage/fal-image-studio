name: Generate Images

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to use"
        required: true
        type: choice
        options:
          - reve
          - seedream
          - nano-banana2
          - clarity-upscaler
      prompt:
        description: "Text prompt"
        required: false
        type: string
      image_url:
        description: "Input image URL (optional)"
        required: false
        type: string
      card_state_b64:
        description: "Base64-encoded card snapshot from the web UI"
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run generation
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_PROMPT: ${{ inputs.prompt }}
          INPUT_IMAGE_URL: ${{ inputs.image_url }}
          INPUT_CARD_STATE_B64: ${{ inputs.card_state_b64 }}
        run: |
          if [ -n "$INPUT_CARD_STATE_B64" ]; then
            uv run fal-studio run "$INPUT_MODEL" --card-state-b64 "$INPUT_CARD_STATE_B64"
          elif [ -n "$INPUT_IMAGE_URL" ]; then
            uv run fal-studio run "$INPUT_MODEL" -p "$INPUT_PROMPT" -i "$INPUT_IMAGE_URL"
          else
            uv run fal-studio run "$INPUT_MODEL" -p "$INPUT_PROMPT"
          fi

      - name: Commit results
        env:
          INPUT_MODEL: ${{ inputs.model }}
          INPUT_PROMPT: ${{ inputs.prompt }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f outputs/
          if git diff --staged --quiet; then
            echo "No new outputs to commit"
          else
            git commit -m "Generated: ${INPUT_MODEL} - ${INPUT_PROMPT}"
            git push
          fi

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --ref main
